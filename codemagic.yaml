workflows:
  android-release:
    name: Build Android APK
    max_build_duration: 120
    environment:
      java:
        version: 11
      ndk: 25c
    triggering:
      events:
        - push
      branch:
        patterns:
          - pattern: main
            include: true
    scripts:
      - name: Install Buildozer
        script: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer cython
      - name: Build APK
        script: |
          buildozer android release
    artifacts:
      - bin/*.apk
      - bin/*.aab
