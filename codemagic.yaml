workflows:
  android-release:
    name: Build Android APK
    instance_type: linux
    max_build_duration: 120
    environment:
      vars:
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      ndk: 25c
    triggering:
      events:
        - push
    scripts:
      - name: Install buildozer
        script: |
          python3 -m pip install buildozer cython
      - name: Build APK
        script: |
          buildozer android release
    artifacts:
      - bin/*.apk
